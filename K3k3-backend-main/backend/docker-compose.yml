version: '3.9'
services:
  db:
    image: postgis/postgis:15-3.4
    container_name: my_postgres
    environment:
      POSTGRES_USER: defturn
      POSTGRES_PASSWORD: root
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  pgdata:
